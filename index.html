  <style>
    /* CSS Reset & Base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #222;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    
    /* Background Pattern */
    .bg-pattern { position: fixed; inset: 0; pointer-events: none; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .bg-container { margin-top: -40px; }
    .bg-row { display: flex; flex-direction: column; margin-top: -30px; }
    .wrapper { display: flex; }
    .wrapper.offset { transform: translate(-35px, -15px); }
    .arrow-wrapper { position: relative; width: 50px; height: 50px; transform-origin: top; margin-left: 20px; transform: rotate(45deg) translate(0, 25px); overflow: hidden; box-shadow: 0 0 25px rgba(34, 34, 34, 0.75); transition: all 0.3s ease-in-out; }
    .arrow { position: absolute; width: 50px; height: 50px; transition: 0.5s ease-in-out; background-color: #CAD2C5; }
    .arrow.one { top: 10px; left: 10px; background-color: #84A98C; }
    .arrow.two { top: 20px; left: 20px; background-color: #52796F; }
    .arrow.three { top: 30px; left: 30px; background-color: #354F52; }
    .arrow.four { top: 40px; left: 40px; background-color: #2F3E46; }
    
    /* Back Button */
    .back-btn { position: fixed; top: 1rem; left: 1rem; z-index: 50; display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 0.5rem; background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(8px); border: 1px solid #334155; color: white; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3); text-decoration: none; }
    .back-btn:hover { background: rgba(51, 65, 85, 0.9); transform: translateX(-4px); }
    .back-btn svg { width: 1rem; height: 1rem; }
    
    /* Language Toggle */
    .lang-toggle { position: fixed; top: 1rem; right: 1rem; z-index: 50; }
    .lang-btn { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem; border-radius: 0.5rem; background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(8px); border: 1px solid #334155; color: white; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: background-color 0.2s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3); }
    .lang-btn:hover { background: rgba(51, 65, 85, 0.9); }
    .lang-menu { position: absolute; top: 100%; right: 0; margin-top: 0.5rem; width: 10rem; border-radius: 0.5rem; background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(8px); border: 1px solid #334155; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); overflow: hidden; opacity: 0; transform: translateY(-10px); pointer-events: none; transition: opacity 0.2s, transform 0.2s; }
    .lang-menu.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .lang-option { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 0.75rem 1rem; font-size: 0.875rem; color: white; background: transparent; border: none; cursor: pointer; transition: background-color 0.2s; }
    .lang-option:hover { background: rgba(51, 65, 85, 0.5); }
    .lang-option.active { background: rgba(51, 65, 85, 0.3); }
    .check-icon { width: 1rem; height: 1rem; color: #10b981; }
    
    /* Header */
    header { position: relative; z-index: 10; padding: 3rem 1rem 2rem; text-align: center; }
    .logo-container { display: inline-flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 1.5rem; animation: fadeInDown 0.7s ease-out; }
    .logo-badge { width: 3rem; height: 3rem; border-radius: 0.75rem; background: linear-gradient(135deg, #34d399, #059669); display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3); }
    .logo-badge svg { width: 1.5rem; height: 1.5rem; color: white; }
    .logo-text { font-size: 2rem; font-weight: 800; color: white; letter-spacing: -0.025em; }
    .logo-text .domain { color: #10b981; }
    @media (min-width: 640px) { .logo-text { font-size: 2.5rem; } }
    @media (min-width: 1024px) { .logo-text { font-size: 3rem; } }
    .subtitle { font-size: 1.125rem; color: #94a3b8; max-width: 36rem; margin: 0 auto; line-height: 1.75; }
    @media (min-width: 640px) { .subtitle { font-size: 1.25rem; } }
    .divider { margin-top: 2rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .divider-line { height: 1px; width: 3rem; background: #334155; }
    .divider-dot { width: 0.5rem; height: 0.5rem; border-radius: 50%; background: #334155; }
    
    /* Main Content */
    main { position: relative; z-index: 10; flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .cards-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; max-width: 64rem; width: 100%; }
    @media (min-width: 768px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1280px) { .cards-grid { grid-template-columns: repeat(3, 1fr); } }
    
    /* App Cards */
    .app-card { position: relative; overflow: hidden; border-radius: 1rem; cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); animation: fadeInUp 0.5s ease-out backwards; text-decoration: none; display: block; aspect-ratio: 16/10; }
    .app-card:hover { transform: translateY(-8px) scale(1.02); }
    .app-card:hover .app-bg { transform: scale(1.1); }
    .app-card:hover .app-overlay { opacity: 0.4; }
    .app-card:hover .app-content { transform: translateY(-4px); }
    .app-card:hover .open-btn { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    .app-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .app-gradient { position: absolute; inset: 0; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .app-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.1) 100%); transition: opacity 0.4s; }
    .app-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 1.5rem; transition: transform 0.4s; }
    .app-tag { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; background: rgba(16, 185, 129, 0.9); color: white; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
    .app-title { font-size: 1.5rem; font-weight: 700; color: white; margin-bottom: 0.5rem; letter-spacing: -0.025em; }
    .app-desc { font-size: 0.875rem; color: rgba(255, 255, 255, 0.8); line-height: 1.5; }
    .open-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); width: 4rem; height: 4rem; border-radius: 50%; background: rgba(255, 255, 255, 0.95); display: flex; align-items: center; justify-content: center; opacity: 0; transition: all 0.3s; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3); }
    .open-btn svg { width: 1.5rem; height: 1.5rem; color: #1e293b; margin-left: 4px; }
    
    /* Coming Soon Card */
    .coming-soon-card { border: 2px dashed #334155; background: rgba(30, 41, 59, 0.3); display: flex; flex-direction: column; align-items: center; justify-content: center; aspect-ratio: 16/10; border-radius: 1rem; }
    .coming-soon-card svg { width: 3rem; height: 3rem; color: #475569; margin-bottom: 1rem; }
    .coming-soon-text { font-size: 1rem; font-weight: 600; color: #64748b; }
    
    /* Footer */
    footer { position: relative; z-index: 10; padding: 2rem 1rem; border-top: 1px solid #1e293b; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); margin-top: auto; }
    .footer-content { max-width: 64rem; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    @media (min-width: 640px) { .footer-content { flex-direction: row; justify-content: space-between; } }
    .footer-brand { display: flex; align-items: center; gap: 0.75rem; }
    .footer-badge { width: 2rem; height: 2rem; border-radius: 0.5rem; background: #10b981; display: flex; align-items: center; justify-content: center; }
    .footer-badge svg { width: 1rem; height: 1rem; color: white; }
    .footer-name { font-size: 0.875rem; font-weight: 500; color: #cbd5e1; }
    .footer-copy { font-size: 0.875rem; color: #64748b; text-align: center; }
    @media (min-width: 640px) { .footer-copy { text-align: right; } }
    
    /* Animations */
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

    </div>
  </div>

  <!-- Back Button -->
  <a href="https://dava.bg" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>

    </button>
    <div class="lang-menu" id="langMenu">
      <button class="lang-option active" data-lang="bg">🇧🇬 <span data-text="bgLang">Български</span><svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></button>
      <button class="lang-option" data-lang="en">🇬🇧 <span data-text="enLang">English</span><svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></button>
    </div>

  <!-- Header -->
  <header>
    <div class="logo-container">
      <div class="logo-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="14" rx="1"></rect><rect width="7" height="7" x="3" y="14" rx="1"></rect></svg>
      </div>
      <h1 class="logo-text"><span class="domain">APPS.</span>DAVA.bg</h1>
    </div>
    <p class="subtitle" data-text="subtitle">Уеб приложения и дигитални инструменти за продуктивност</p>
    <div class="divider"><div class="divider-line"></div><div class="divider-dot"></div><div class="divider-line"></div></div>
  </header>

  <!-- Main Content -->
  <main>
    <div class="cards-grid" id="cardsGrid"></div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-content">
      <div class="footer-brand">
        <div class="footer-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="14" rx="1"></rect><rect width="7" height="7" x="3" y="14" rx="1"></rect></svg></div>
        <span class="footer-name">APPS.DAVA.bg</span>
      </div>
      <p class="footer-copy" data-text="copyright">© 2025 Всички права запазени. Създадено с грижа.</p>
    </div>
  </footer>

  <script>
    const translations = {
      bg: {
        subtitle: 'Уеб приложения и дигитални инструменти за продуктивност',
        backBtn: 'Назад',
        copyright: '© {year} Всички права запазени. Създадено с грижа.',
        bgLang: 'Български',
        enLang: 'Английски',
        comingSoon: 'Очаквайте скоро',
        apps: [
          { id: 'recycling', title: 'Рециклиране на строителни материали', desc: 'Ще съберем вашите неизползвани строителни материали за рециклиране.', tag: 'ECO', href: 'https://recycling.dava.bg', gradient: 'linear-gradient(135deg, #059669 0%, #10b981 50%, #34d399 100%)' }
        ]
      },
      en: {
        subtitle: 'Web applications and digital productivity tools',
        backBtn: 'Back',
        copyright: '© {year} All rights reserved. Built with care.',
        bgLang: 'Bulgarian',
        enLang: 'English',
        comingSoon: 'Coming Soon',
        apps: [
          { id: 'recycling', title: 'Recycling Construction Materials', desc: 'We will collect your unused construction materials for recycling.', tag: 'ECO', href: 'https://recycling.dava.bg', gradient: 'linear-gradient(135deg, #059669 0%, #10b981 50%, #34d399 100%)' }
        ]
      }
    };

    let currentLang = 'bg';
    const langBtn = document.getElementById('langBtn');
    const langMenu = document.getElementById('langMenu');
    const langLabel = document.getElementById('langLabel');
    const cardsGrid = document.getElementById('cardsGrid');

    function init() {
      const savedLang = localStorage.getItem('language');
      if (savedLang === 'en' || savedLang === 'bg') currentLang = savedLang;
      const urlParams = new URLSearchParams(window.location.search);
      const urlLang = urlParams.get('lang');
      if (urlLang === 'en' || urlLang === 'bg') currentLang = urlLang;
      updateLanguage();
      renderCards();
      setupEventListeners();
    }

    function updateLanguage() {
      const t = translations[currentLang];
      document.documentElement.lang = currentLang;
      langLabel.textContent = currentLang.toUpperCase();
      document.querySelectorAll('.lang-option').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === currentLang));
      document.querySelectorAll('[data-text]').forEach(el => {
        const key = el.dataset.text;
        if (t[key]) el.textContent = t[key].replace('{year}', new Date().getFullYear());
      });
      document.title = 'APPS.DAVA.bg - ' + (currentLang === 'bg' ? 'Приложения' : 'Apps');
    }

    function renderCards() {
      const t = translations[currentLang];
      let html = t.apps.map((app, index) => `
        <a href="${app.href}"  class="app-card" style="animation-delay: ${index * 0.1}s">
          <div class="app-gradient" style="background: ${app.gradient};"></div>
          <div class="app-overlay"></div>
          <div class="app-content">
            <span class="app-tag">${app.tag}</span>
            <h2 class="app-title">${app.title}</h2>
            <p class="app-desc">${app.desc}</p>
          </div>
          <div class="open-btn"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></div>
        </a>
      `).join('');
      html += `<div class="coming-soon-card" style="animation-delay: ${t.apps.length * 0.1}s"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg><span class="coming-soon-text">${t.comingSoon}</span></div>`;
      cardsGrid.innerHTML = html;
    }

    function setupEventListeners() {
      langBtn.addEventListener('click', () => langMenu.classList.toggle('open'));
      document.querySelectorAll('.lang-option').forEach(btn => {
        btn.addEventListener('click', () => {
          currentLang = btn.dataset.lang;
          localStorage.setItem('language', currentLang);
          updateLanguage();
          renderCards();
          langMenu.classList.remove('open');
          const url = new URL(window.location);
          url.searchParams.set('lang', currentLang);
          window.history.replaceState({}, '', url);
        });
      });
      document.addEventListener('click', (e) => { if (!e.target.closest('.lang-toggle')) langMenu.classList.remove('open'); });
    }

    init();
  </script>
</body>
</html>
